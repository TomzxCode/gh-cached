site_name: gh-cached Documentation
site_description: Documentation for gh-cached, a GitHub CLI with disk-based caching
site_url: https://tomzxcode.github.io/gh-cached
repo_name: TomzxCode/gh-cached
repo_url: https://github.com/TomzxCode/gh-cached
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Open Sans
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - User Guide:
    - Installation: user-guide/installation.md
    - Authentication: user-guide/authentication.md
    - Cache: user-guide/cache.md
    - Issues: user-guide/issues.md
    - Pull Requests: user-guide/pull-requests.md
    - Repositories: user-guide/repositories.md
    - Flag Reference: user-guide/flag-reference.md
  - Context:
    - Project Overview: sdlc/context/project-overview.md
    - Architecture: sdlc/context/architecture.md
    - Conventions: sdlc/context/conventions.md
    - Vocabulary: sdlc/context/vocabulary.md
  - Features:
    - Issue Browsing:
      - Requirements: sdlc/features/FEAT-0001-issue-browsing/requirements.md
      - Specification: sdlc/features/FEAT-0001-issue-browsing/specification.md
    - PR Browsing:
      - Requirements: sdlc/features/FEAT-0002-pr-browsing/requirements.md
      - Specification: sdlc/features/FEAT-0002-pr-browsing/specification.md
    - Cache Management:
      - Requirements: sdlc/features/FEAT-0003-cache-management/requirements.md
      - Specification: sdlc/features/FEAT-0003-cache-management/specification.md
    - Repository Listing:
      - Requirements: sdlc/features/FEAT-0004-repository-listing/requirements.md
      - Specification: sdlc/features/FEAT-0004-repository-listing/specification.md
    - Mock Server:
      - Requirements: sdlc/features/FEAT-0005-mock-server/requirements.md
      - Specification: sdlc/features/FEAT-0005-mock-server/specification.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TomzxCode/gh-cached
